<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Homework_4</title>
		<link rel="stylesheet" href="./css/style.css" />
	</head>
	<body>
		<form class="form">
			<fieldset class="form-group">
				<p class="title">Ваши персональные данные</p>
				<label class="lable">
					<p>Ваше имя</p>
					<input type="text" placeholder="Ваше имя" name="name" required />
				</label>
				<label class="lable">
					<p>Ваш возраст</p>
					<input type="number" placeholder="Возраст" name="age" required />
				</label>
				<label class="lable">
					<p>Ваш номер телефона</p>
					<input
						type="tel"
						placeholder="Номер телефона"
						name="telephone"
						required
					/>
				</label>
				<label class="lable">
					<p>Ваша почта</p>
					<input type="email" placeholder="Почта" name="mail" required />
				</label>
				<label class="lable">
					<p>Сообщение</p>
					<textarea></textarea>
				</label>
				<label class="lable">
					<input type="checkbox" required />
					<span>Я принимаю правила</span>
				</label>
				<button type="submit">Отправить</button>
			</fieldset>
		</form>
	</body>
</html>
